sequence:
  sequence_length: 168 # 7 days of hourly data
  prediction_horizon: 24 # forecast next 24 hours

features:
  # Hours back. 24 and 168 carry the daily and weekly cycles; 1-3 carry momentum.
  lags: [1, 2, 3, 24, 48, 168]
  # Trailing windows, in hours, excluding the current hour.
  rolling_windows: [24, 168]
  scaler: "standard"

lstm:
  hidden_size: 64
  num_layers: 2
  dropout: 0.2
  bidirectional: false
  learning_rate: 0.001
  batch_size: 64
  max_epochs: 100
  early_stopping_patience: 10
  use_mixed_precision: false
  lr_scheduler:
    type: "reduce_on_plateau"
    factor: 0.5
    patience: 5

baselines:
  # Every baseline forecasts the same 24 hours the LSTM does. Predicting t+1
  # instead scores 2.18x better and answers a different question.
  random_state: 42
  n_jobs: -1
  # Same hour one week back. Not a model — the bar the others have to clear.
  seasonal_naive:
    season_length: 168
  random_forest:
    n_estimators: 200
    max_depth: 12
  xgboost:
    n_estimators: 300
    max_depth: 8
    learning_rate: 0.05
  lightgbm:
    n_estimators: 300
    num_leaves: 31
    learning_rate: 0.05
