source:
  filename: "PJME_hourly.csv"
  datetime_column: "Datetime"
  target_column: "PJME_MW"

validation:
  min_rows: 1000
  # Two keys, not one: a NaN reading and an hour the source never shipped are
  # different failures with different fixes, and one key could not be loosened
  # for either without loosening it for both. PJME has 0% of the former and
  # 0.02% of the latter.
  allow_missing_target_ratio: 0.01
  allow_missing_index_ratio: 0.01
  # Lowercase "h": pandas 2.2 deprecated "H" and will remove it.
  expected_frequency: "h"

split:
  train_ratio: 0.7
  validation_ratio: 0.15
  test_ratio: 0.15
